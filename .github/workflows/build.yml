name: Build Electron App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        working-directory: ./backend
        run: npm install

      - name: Create .env file
        working-directory: ./backend
        shell: bash
        run: |
          echo "PORT=3000" > .env
          echo "MONGODB_URI=mongodb://gunesgozlemcisi_db_user:adana123@ac-c0umnms-shard-00-00.azseniu.mongodb.net:27017,ac-c0umnms-shard-00-01.azseniu.mongodb.net:27017,ac-c0umnms-shard-00-02.azseniu.mongodb.net:27017/inonu_site?ssl=true&replicaSet=atlas-km05m6-shard-0&authSource=admin&retryWrites=true&w=majority&appName=Cluster0" >> .env

      - name: Build Windows App
        working-directory: ./backend
        run: npm run build:exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: dist-electron/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        working-directory: ./backend
        run: npm install

      - name: Create .env file
        working-directory: ./backend
        run: |
          echo "PORT=3000" > .env
          echo "MONGODB_URI=mongodb://gunesgozlemcisi_db_user:adana123@ac-c0umnms-shard-00-00.azseniu.mongodb.net:27017,ac-c0umnms-shard-00-01.azseniu.mongodb.net:27017,ac-c0umnms-shard-00-02.azseniu.mongodb.net:27017/inonu_site?ssl=true&replicaSet=atlas-km05m6-shard-0&authSource=admin&retryWrites=true&w=majority&appName=Cluster0" >> .env

      - name: Build Mac App
        working-directory: ./backend
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-setup
          path: dist-electron/*.dmg

  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: release-files

      - name: Download Mac Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-setup
          path: release-files

      - name: Create Public Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Stok Yönetimi v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
